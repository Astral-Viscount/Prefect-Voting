<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <title>Prefect Voting System</title>
</head>

<body class="background">

<div class="header">
    <h1>Burnside High School</h1>
    <h2>Prefect Election 2026</h2>
</div>

<div class="main-card">

    <p class="tagline">
        Official student leadership voting system
    </p>

    {% if user %}
        <div class="status">
            <h3>Logged In</h3>
            <p>{{ user }}</p>

            <a href="/dashboard" class="btn green">Dashboard</a>
            <a href="/logout" class="btn red">Logout</a>
        </div>

    {% else %}
        <div class="status">
            <h3>Student Access</h3>
            <p>Sign in using your school Google account</p>

            <a href="/login" class="btn blue">Login with Google</a>
        </div>
    {% endif %}

</div>

</body>
</html>
